name: Run basic scripts to check for syntactical correctness 
on:
  push:
    branches-ignore: [ main ]
    tags: 
    - "v1.*"
  pull_request:
    branches: [ main ]

jobs:
  run-xml-linter-on-sanbox:
    name: XML linter for sandbox and create release if tag on commit
    env: 
      VS_PROD_KEY: ${{ secrets.VS_KEY_FOR_PACKAGE }}
      ZIP_FILE_NAME: "Naust-Sandbox.zip"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Action actors
        run: ${{ github.actor }} triggered action by ${{ github.triggering_actor }}
      - name: install xml linter from utils
        run: sudo apt-get install libxml2-utils
      - name: lint sandbox file
        run: xmllint "Naust Sandbox.wsb"
      - name: replace placeholder with personal key
        run: sed -i 's/vs_product_key/$VS_PROD_KEY/' Sandbox-RO/RunOnLogin.ps1
      - name: zip files into release
        run: zip Naust-Sandbox.zip "./Naust Sandbox.wsb" Sandbox-RO/RunOnLogin.ps1 Sandbox-RO/ACTInstall.ps1 Sandbox-RO/installMaven.ps1
      - name: Upload zip file to artifact repository
        uses: actions/upload-artifact@v4
        if: github.ref_type == 'tag'
        with:
          name: NSSandboxZip
          path: ${{ env.ZIP_FILE_NAME }}
  release:
    needs: run-xml-linter-on-sanbox
    runs-on: ubuntu
    permissions:
      contents: write
    if: github.ref_type == 'tag'
    steps:
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    - uses: actions/download-artifact@v4
      with:
        name: NSSandboxZip
    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
        asset_path: .\"Naust-Sandbox.zip"
        asset_name: "Naust-Sandbox.zip"
        asset_content_type: application/zip
        
